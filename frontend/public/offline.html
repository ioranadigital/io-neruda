<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>io-neruda - Sin conexión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      padding: 40px;
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .info {
      background: #f5f5f5;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 30px;
      text-align: left;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
      text-decoration: none;
    }

    .button:hover {
      background: #764ba2;
    }

    .button:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      background: #fff3cd;
      border-radius: 6px;
      color: #856404;
      font-size: 14px;
      display: none;
    }

    .status.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p class="subtitle">io-neruda está temporalmente sin conexión</p>

    <div class="info">
      <strong>¿Qué hacer?</strong>
      <ul style="margin-top: 10px; margin-left: 20px;">
        <li>Verifica tu conexión a internet</li>
        <li>Intenta recargar la página en unos momentos</li>
        <li>Tus cambios se sincronizarán automáticamente cuando vuelvas a conectarte</li>
      </ul>
    </div>

    <button class="button" onclick="location.reload()">
      Reintentar
    </button>

    <div class="status" id="status">
      Intentando reconectar... ⏳
    </div>
  </div>

  <script>
    function checkConnection() {
      fetch('/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(() => {
          // Connected
          location.reload();
        })
        .catch(() => {
          // Still offline
          document.getElementById('status').classList.add('visible');
          setTimeout(checkConnection, 3000);
        });
    }

    // Check every 5 seconds
    setInterval(() => {
      if (navigator.onLine) {
        checkConnection();
      }
    }, 5000);

    // Listen for online event
    window.addEventListener('online', checkConnection);
  </script>
</body>
</html>
